{% extends "base.html" %}
{% block title %}Usuarios{% endblock %}

{% block content %}
<div x-data="usuariosApp()" x-init="init()">

  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Usuarios del sistema</h2>
    <button @click="abrirModal()" class="bg-amber-700 hover:bg-amber-800 text-white px-4 py-2 rounded-lg text-sm font-medium">
      + Nuevo usuario
    </button>
  </div>

  <div class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
        <tr>
          <th class="px-4 py-3 text-left">Nombre</th>
          <th class="px-4 py-3 text-left">Usuario</th>
          <th class="px-4 py-3 text-left">Rol</th>
          <th class="px-4 py-3 text-left">Sucursal</th>
          <th class="px-4 py-3 text-center">Estado</th>
          <th class="px-4 py-3 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <template x-if="loading">
          <tr><td colspan="6" class="text-center py-8 text-gray-400">Cargando...</td></tr>
        </template>
        <template x-for="u in usuarios" :key="u.uid">
          <tr class="border-t border-gray-100 hover:bg-gray-50">
            <td class="px-4 py-3 font-medium text-gray-800" x-text="u.nombre"></td>
            <td class="px-4 py-3 text-gray-600" x-text="u.usuario"></td>
            <td class="px-4 py-3">
              <span :class="u.role === 'dueno' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'"
                    class="px-2 py-1 rounded-full text-xs font-medium capitalize"
                    x-text="u.role === 'dueno' ? 'Dueño' : 'Encargado'"></span>
            </td>
            <td class="px-4 py-3 text-gray-600 text-xs" x-text="sucursalNombre(u.sucursal_id)"></td>
            <td class="px-4 py-3 text-center">
              <span :class="u.activo ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                    class="px-2 py-1 rounded-full text-xs font-medium"
                    x-text="u.activo ? 'Activo' : 'Inactivo'"></span>
            </td>
            <td class="px-4 py-3 text-right flex gap-2 justify-end">
              <button @click="abrirModal(u)" class="text-blue-600 hover:underline text-xs">Editar</button>
              <button @click="toggleActivo(u)"
                      :class="u.activo ? 'text-red-500' : 'text-green-600'"
                      class="hover:underline text-xs"
                      x-text="u.activo ? 'Desactivar' : 'Activar'"></button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div x-show="modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" x-cloak>
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md mx-4" @click.stop>
      <h3 class="text-lg font-bold text-gray-800 mb-4" x-text="editando ? 'Editar usuario' : 'Nuevo usuario'"></h3>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre completo</label>
          <input x-model="form.nombre" type="text"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
        <div x-show="!editando">
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de usuario</label>
          <input x-model="form.usuario" type="text"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
                 placeholder="ej: maria_6pte">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Contraseña <span x-show="editando" class="text-gray-400 font-normal">(dejar vacío para no cambiar)</span>
          </label>
          <input x-model="form.password" type="password"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
                 placeholder="mínimo 6 caracteres">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Rol</label>
          <select x-model="form.role"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
            <option value="encargado">Encargado</option>
            <option value="dueno">Dueño</option>
          </select>
        </div>
        <div x-show="form.role === 'encargado'">
          <label class="block text-sm font-medium text-gray-700 mb-1">Sucursal</label>
          <select x-model="form.sucursal_id"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
            <option value="">Seleccionar...</option>
            {% for sid, sname in sucursales.items() %}
            <option value="{{ sid }}">{{ sname }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div x-show="formError" class="mt-3 text-red-600 text-sm" x-text="formError"></div>

      <div class="flex justify-end gap-3 mt-6">
        <button @click="cerrarModal()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancelar</button>
        <button @click="guardar()" :disabled="guardando"
                class="bg-amber-700 hover:bg-amber-800 text-white px-4 py-2 rounded-lg text-sm font-medium disabled:opacity-50">
          <span x-text="guardando ? 'Guardando...' : 'Guardar'"></span>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  const SUCURSALES = {{ sucursales | tojson }};

  function usuariosApp() {
    return {
      usuarios: [],
      loading: true,
      modal: false,
      editando: null,
      form: { nombre: '', usuario: '', password: '', role: 'encargado', sucursal_id: '' },
      formError: '',
      guardando: false,

      async init() {
        const res = await fetch('/usuarios/api');
        this.usuarios = await res.json();
        this.loading = false;
      },

      sucursalNombre(id) {
        return SUCURSALES[id] || (id ? id : '—');
      },

      abrirModal(u = null) {
        this.editando = u;
        this.form = u
          ? { nombre: u.nombre, usuario: u.usuario, password: '', role: u.role, sucursal_id: u.sucursal_id }
          : { nombre: '', usuario: '', password: '', role: 'encargado', sucursal_id: '' };
        this.formError = '';
        this.modal = true;
      },

      cerrarModal() {
        this.modal = false;
        this.editando = null;
      },

      async guardar() {
        this.formError = '';
        if (!this.form.nombre.trim()) { this.formError = 'El nombre es requerido'; return; }
        if (!this.editando && !this.form.usuario.trim()) { this.formError = 'El usuario es requerido'; return; }
        if (!this.editando && this.form.password.length < 6) { this.formError = 'La contraseña debe tener al menos 6 caracteres'; return; }
        if (this.form.role === 'encargado' && !this.form.sucursal_id) { this.formError = 'Selecciona una sucursal'; return; }

        this.guardando = true;
        try {
          let res;
          if (this.editando) {
            res = await fetch(`/usuarios/api/${this.editando.uid}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.form)
            });
          } else {
            res = await fetch('/usuarios/api', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.form)
            });
          }
          const data = await res.json();
          if (!res.ok) { this.formError = data.error || 'Error al guardar'; return; }

          if (this.editando) {
            const idx = this.usuarios.findIndex(u => u.uid === this.editando.uid);
            if (idx !== -1) this.usuarios[idx] = { ...this.usuarios[idx], ...this.form };
          } else {
            this.usuarios.push(data);
          }
          this.cerrarModal();
        } finally {
          this.guardando = false;
        }
      },

      async toggleActivo(u) {
        const accion = u.activo ? 'desactivar' : 'activar';
        if (!confirm(`¿${accion.charAt(0).toUpperCase() + accion.slice(1)} a ${u.nombre}?`)) return;
        await fetch(`/usuarios/api/${u.uid}/toggle`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ activo: !u.activo })
        });
        const idx = this.usuarios.findIndex(x => x.uid === u.uid);
        if (idx !== -1) this.usuarios[idx].activo = !u.activo;
      }
    }
  }
</script>
{% endblock %}
