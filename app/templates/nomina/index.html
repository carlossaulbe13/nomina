{% extends "base.html" %}
{% block title %}Nómina Semanal{% endblock %}

{% block content %}
<div x-data="nominaApp()" x-init="init()" @cobrar="pagar($event.detail.emp)">

  <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
    <div class="flex items-center gap-2">
      <h2 class="text-2xl font-bold text-gray-800">Nómina Semanal</h2>
    </div>
    <!-- Tabs (Pagos solo para dueño) -->
    <div class="flex gap-1 bg-gray-100 rounded-lg p-1">
      <button @click="tab = 'tabla'"
              :class="tab === 'tabla' ? 'bg-white shadow text-gray-800' : 'text-gray-500 hover:text-gray-700'"
              class="px-4 py-1.5 rounded-md text-sm font-medium transition">
        Tabla
      </button>
      <template x-if="SESSION_ROL === 'dueno'">
        <button @click="tab = 'pagos'"
                :class="tab === 'pagos' ? 'bg-white shadow text-gray-800' : 'text-gray-500 hover:text-gray-700'"
                class="px-4 py-1.5 rounded-md text-sm font-medium transition">
          Pagos
        </button>
      </template>
    </div>
  </div>

  <div x-show="tab === 'tabla'" class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div></div>
    <div class="flex items-center gap-3">
      <div>
        <label class="text-sm text-gray-600 mr-1">Semana:</label>
        <select x-model="semana" @change="cargarNomina()"
                class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
          <template x-for="s in semanas" :key="s">
            <option :value="s" x-text="s"></option>
          </template>
        </select>
      </div>
      <div>
        <select x-model="filtroSucursal" @change="cargarNomina()"
                class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
          <option value="">Todas las sucursales</option>
          <option value="s1">6 PTE.</option>
          <option value="s2">12 PTE.</option>
        </select>
      </div>
      <button @click="imprimir()" :disabled="!nomina?.empleados?.length || generando"
              class="bg-gray-700 hover:bg-gray-800 disabled:opacity-40 text-white px-3 py-2 rounded-lg text-sm transition">
        <span x-text="generando ? 'Generando PDFs…' : '🖨️ Descargar nóminas'"></span>
      </button>
    </div>
  </div>

  <!-- ====== TAB TABLA ====== -->
  <div x-show="tab === 'tabla'">

  <!-- Loading -->
  <div x-show="loading" class="text-center py-12 text-gray-400">Cargando nómina...</div>

  <!-- Tabla de nómina -->
  <div x-show="!loading && nomina" class="bg-white rounded-xl shadow overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-amber-700 text-white">
        <tr>
          <th class="px-4 py-3 text-left sticky left-0 bg-amber-700">Empleado</th>
          <th class="px-4 py-3 text-left">Trabajó en</th>
          <th class="px-4 py-3 text-left">Pagar en</th>
          <template x-for="(dia, i) in nomina?.dias_labels || []" :key="i">
            <th class="px-3 py-3 text-center min-w-[80px]">
              <div x-text="dia"></div>
              <div class="text-xs font-normal opacity-80" x-text="nomina?.fechas?.[i]?.slice(5)"></div>
            </th>
          </template>
          <th class="px-4 py-3 text-right bg-amber-800">Total</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="emp in nomina?.empleados || []" :key="emp.empleado_id">
          <tr class="border-t border-gray-100 hover:bg-amber-50">
            <td class="px-4 py-3 font-medium text-gray-800 sticky left-0 bg-white" x-text="emp.nombre"></td>
            <td class="px-4 py-3 text-gray-500 text-xs">
              <template x-for="sid in emp.sucursales_trabajadas" :key="sid">
                <span class="inline-block bg-gray-100 rounded px-1 mr-1" x-text="SUCURSALES[sid] || sid"></span>
              </template>
              <span x-show="!emp.sucursales_trabajadas?.length">—</span>
            </td>
            <td class="px-3 py-2">
              <select @change="setPagoSucursal(emp, $event.target.value)"
                      class="border border-gray-300 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-amber-500">
                <template x-for="[sid, snombre] in Object.entries(SUCURSALES)" :key="sid">
                  <option :value="sid" :selected="emp.sucursal_pago === sid" x-text="snombre"></option>
                </template>
              </select>
            </td>
            <template x-for="(fecha, i) in nomina?.fechas || []" :key="i">
              <td class="px-3 py-3 text-center">
                <template x-if="emp.dias[fecha]">
                  <div>
                    <span class="block text-xs capitalize text-gray-600" x-text="emp.dias[fecha].rol"></span>
                    <span class="block text-xs font-semibold text-gray-800">$<span x-text="emp.dias[fecha].tarifa"></span></span>
                    <span class="block text-xs text-gray-400" x-text="SUCURSALES[emp.dias[fecha].sucursal_id] || ''"></span>
                  </div>
                </template>
                <template x-if="!emp.dias[fecha]">
                  <span class="text-gray-200">–</span>
                </template>
              </td>
            </template>
            <td class="px-4 py-3 text-right font-bold text-amber-700">
              $<span x-text="emp.total.toLocaleString()"></span>
            </td>
          </tr>
        </template>
        <template x-if="nomina?.empleados?.length === 0">
          <tr><td :colspan="(nomina?.dias_labels?.length || 7) + 4" class="text-center py-8 text-gray-400">Sin registros para esta semana</td></tr>
        </template>
      </tbody>
      <tfoot class="bg-gray-50 border-t-2 border-gray-200">
        <tr>
          <td :colspan="(nomina?.dias_labels?.length || 7) + 3" class="px-4 py-3 text-right font-semibold text-gray-700">
            Gran Total:
          </td>
          <td class="px-4 py-3 text-right font-bold text-xl text-amber-700">
            $<span x-text="nomina?.gran_total?.toLocaleString() || 0"></span>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>

  <!-- Resumen de pago por sucursal -->
  <div x-show="!loading && nomina?.empleados?.length > 0" class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
    <template x-for="[sid, total] in Object.entries(nomina?.totales_sucursal || {})" :key="sid">
      <div class="bg-white rounded-xl shadow p-5 border-l-4 border-amber-500">
        <p class="text-sm text-gray-500">Enviar a <span class="font-semibold" x-text="SUCURSALES[sid] || sid"></span></p>
        <p class="text-2xl font-bold text-amber-700 mt-1">$<span x-text="total.toLocaleString()"></span></p>
      </div>
    </template>
  </div>

  <div x-show="!loading && !nomina" class="text-center py-12 text-gray-400">
    No hay datos disponibles
  </div>

  </div><!-- fin tab tabla -->

  <!-- ====== TAB PAGOS (solo dueño) ====== -->
  <div x-show="tab === 'pagos'">

    <!-- Selector semana + sucursal -->
    <div class="flex items-center gap-3 mb-6 flex-wrap">
      <label class="text-sm text-gray-600">Semana:</label>
      <select x-model="semana" @change="cargarNomina()"
              class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
        <template x-for="s in semanas" :key="s">
          <option :value="s" x-text="s"></option>
        </template>
      </select>
      <select x-model="filtroSucursalPagos"
              class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
        <option value="">Todas las sucursales</option>
        <option value="s1">6 PTE.</option>
        <option value="s2">12 PTE.</option>
      </select>
    </div>

    <div x-show="loading" class="text-center py-12 text-gray-400">Cargando...</div>

    <div x-show="!loading">

      <!-- Por cobrar, agrupado por sucursal -->
      <template x-for="[sid, snombre] in Object.entries(SUCURSALES)" :key="sid">
        <div x-show="pendientesPorSucursal(sid).length > 0 && (filtroSucursalPagos === '' || filtroSucursalPagos === sid)" class="mb-6">
          <h3 class="text-xs font-semibold uppercase tracking-widest text-gray-400 mb-3 px-1"
              x-text="snombre"></h3>
          <div class="space-y-2 overflow-hidden">
            <template x-for="emp in pendientesPorSucursal(sid)" :key="emp.empleado_id">
              <div x-show="!cobrados[emp.empleado_id]"
                   x-transition:leave="transition ease-in duration-300"
                   x-transition:leave-start="opacity-100 translate-x-0"
                   x-transition:leave-end="opacity-0 translate-x-full"
                   class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div x-data="{
                       ox: 0, tw: 0, dr: false, sx: 0,
                       get pos() { return Math.min(Math.max(this.ox, 0), Math.max(this.tw - 52, 1)); },
                       get pct() { return this.tw ? Math.min(Math.max(this.ox, 0), Math.max(this.tw - 52, 1)) / Math.max(this.tw - 52, 1) : 0; }
                     }">

                  <!-- Info empleado -->
                  <div class="px-5 pt-4 pb-3 flex items-center justify-between">
                    <div>
                      <p class="font-semibold text-gray-800" x-text="emp.nombre"></p>
                      <p class="text-xs text-gray-400 mt-0.5" x-text="Object.keys(emp.dias||{}).length + ' días trabajados'"></p>
                    </div>
                    <span class="font-bold text-amber-700 text-lg">$<span x-text="emp.total.toLocaleString()"></span></span>
                  </div>

                  <!-- Slider -->
                  <div class="mx-4 mb-4 relative h-12 bg-gray-100 rounded-full select-none touch-none overflow-hidden cursor-grab active:cursor-grabbing"
                       @pointerdown="dr=true; tw=$el.offsetWidth; sx=$event.clientX; $el.setPointerCapture($event.pointerId)"
                       @pointermove="if(dr) ox=$event.clientX - sx"
                       @pointerup="dr=false; pct>=0.85 ? $dispatch('cobrar',{emp}) : (ox=0)"
                       @pointercancel="dr=false; ox=0">

                    <!-- Relleno de color -->
                    <div class="absolute inset-y-0 left-0 bg-amber-100 pointer-events-none rounded-full"
                         :style="{ width: (pos+52)+'px', transition: dr ? 'none' : 'width 0.35s ease' }"></div>

                    <!-- Texto "Desliza para cobrar" -->
                    <span class="absolute inset-0 flex items-center justify-center text-xs text-gray-400 font-medium pl-10 pointer-events-none"
                          :style="{ opacity: Math.max(0, 1 - pct*2.5), transition: 'opacity 0.1s' }">
                      Desliza para cobrar &nbsp;›
                    </span>

                    <!-- Texto "✓ Cobrado" -->
                    <span class="absolute inset-0 flex items-center justify-center text-sm text-amber-700 font-semibold pointer-events-none"
                          :style="{ opacity: Math.max(0, (pct-0.4)*2), transition: 'opacity 0.1s' }">
                      ✓ Cobrado
                    </span>

                    <!-- Handle -->
                    <div class="absolute top-1.5 left-1.5 w-9 h-9 rounded-full bg-amber-500 flex items-center justify-center text-white text-xl font-bold shadow pointer-events-none"
                         :style="{ transform: 'translateX('+pos+'px)', transition: dr ? 'none' : 'transform 0.35s ease' }">
                      ›
                    </div>
                  </div>

                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Todos cobrados -->
      <div x-show="todosListos()" class="text-center py-12">
        <div class="text-5xl mb-3">✅</div>
        <p class="text-gray-500 font-medium">Todos cobrados esta semana</p>
      </div>

      <!-- Ya cobrados -->
      <div x-show="cobradosList().length > 0" class="mt-4">
        <h3 class="text-xs font-semibold uppercase tracking-widest text-gray-300 mb-3 px-1">Ya cobrados</h3>
        <div class="space-y-2">
          <template x-for="emp in cobradosList()" :key="emp.empleado_id">
            <div class="bg-gray-50 rounded-xl border border-gray-100 px-5 py-3 flex items-center justify-between">
              <div>
                <p class="text-gray-400 line-through text-sm" x-text="emp.nombre"></p>
                <p class="text-xs text-gray-300" x-text="Object.keys(emp.dias||{}).length + ' días'"></p>
              </div>
              <div class="flex items-center gap-3">
                <span class="text-gray-400 line-through text-sm">$<span x-text="emp.total.toLocaleString()"></span></span>
                <button @click="despagar(emp)" class="text-xs text-amber-600 hover:text-amber-800 underline">Deshacer</button>
              </div>
            </div>
          </template>
        </div>
      </div>

    </div>
  </div><!-- fin tab pagos -->

  <!-- Modal de confirmación -->
  <div x-show="modal.show" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div @click.stop x-transition class="bg-white rounded-2xl shadow-xl max-w-sm w-full mx-4 overflow-hidden">
      <div class="px-6 pt-6 pb-2">
        <div class="flex items-start gap-3">
          <div class="flex-shrink-0 w-10 h-10 rounded-full bg-red-100 flex items-center justify-center">
            <span class="text-lg">🗑️</span>
          </div>
          <div>
            <h3 class="font-semibold text-gray-800 text-base" x-text="modal.titulo"></h3>
            <p class="text-sm text-gray-500 mt-1" x-text="modal.mensaje"></p>
          </div>
        </div>
      </div>
      <div class="flex gap-2 px-6 py-4 justify-end">
        <button @click="modalCancelar()"
                class="px-4 py-2 text-sm rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition">
          Cancelar
        </button>
        <button @click="modalConfirmar()"
                class="px-4 py-2 text-sm rounded-lg bg-red-600 hover:bg-red-700 text-white font-medium transition">
          Eliminar
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  const SUCURSALES = { s1: '6 PTE.', s2: '12 PTE.' };
  const SESSION_ROL = '{{ user.role }}';

  function nominaApp() {
    return {
      semana: '',
      semanas: [],
      filtroSucursal: '',
      nomina: null,
      loading: false,
      generando: false,
      tab: 'tabla',
      cobrados: {},
      filtroSucursalPagos: '',
      modal: { show: false, titulo: '', mensaje: '', resolve: null },

      async init() {
        const today = new Date();
        const iso = this.getISOWeek(today);
        this.semana = iso;

        const res = await fetch('/nomina/api/semanas');
        this.semanas = await res.json();
        if (!this.semanas.includes(iso)) this.semanas.unshift(iso);

        await this.cargarNomina();
        this.escucharCambios();
      },

      escucharCambios() {
        db.ref('registros').on('value', () => { this.cargarNomina(); });
      },

      getISOWeek(d) {
        const date = new Date(d);
        date.setHours(0, 0, 0, 0);
        date.setDate(date.getDate() + 1); // domingo → lunes en ISO
        date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
        const week1 = new Date(date.getFullYear(), 0, 4);
        const weekNum = 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
        return `${date.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
      },

      async cargarNomina() {
        this.loading = true;
        try {
          let url = `/nomina/api?semana=${this.semana}`;
          if (this.filtroSucursal) url += `&sucursal_id=${this.filtroSucursal}`;
          const [resNomina, resCobros] = await Promise.all([
            fetch(url),
            fetch(`/nomina/api/cobros?semana=${this.semana}`)
          ]);
          this.nomina = await resNomina.json();
          const lista = await resCobros.json();
          this.cobrados = Object.fromEntries(lista.map(id => [id, true]));
        } finally {
          this.loading = false;
        }
      },

      pendientesPorSucursal(sid) {
        return (this.nomina?.empleados || []).filter(e => e.sucursal_pago === sid && !this.cobrados[e.empleado_id]);
      },

      cobradosList() {
        return (this.nomina?.empleados || []).filter(e => this.cobrados[e.empleado_id]);
      },

      todosListos() {
        const empleados = this.nomina?.empleados || [];
        return empleados.length > 0 && empleados.every(e => this.cobrados[e.empleado_id]);
      },

      async pagar(emp) {
        this.cobrados = { ...this.cobrados, [emp.empleado_id]: true };
        await fetch('/nomina/api/cobros', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ semana: this.semana, empleado_id: emp.empleado_id })
        });
      },

      async despagar(emp) {
        const nuevo = { ...this.cobrados };
        delete nuevo[emp.empleado_id];
        this.cobrados = nuevo;
        await fetch(`/nomina/api/cobros/${emp.empleado_id}?semana=${this.semana}`, { method: 'DELETE' });
      },

      async imprimir() {
        if (!this.nomina?.empleados?.length) return;
        this.generando = true;
        try {
          if (!window.html2pdf) {
            await new Promise((resolve, reject) => {
              const s = document.createElement('script');
              s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
              s.onload = resolve; s.onerror = reject;
              document.head.appendChild(s);
            });
          }
          for (const sid of Object.keys(SUCURSALES)) {
            await this.generarPDF(sid);
          }
        } finally {
          this.generando = false;
        }
      },

      async generarPDF(sid) {
        const sucNombre = SUCURSALES[sid];
        const semana = this.semana;
        const empleados = this.nomina.empleados.filter(e => e.sucursal_pago === sid);
        if (!empleados.length) return;

        const filas = empleados.map((emp, i) => {
          const dias = Object.values(emp.dias || {});
          const nDias = dias.length;
          const roles = [...new Set(dias.map(d => d.rol))]
            .map(r => r.charAt(0).toUpperCase() + r.slice(1))
            .join(', ');
          const bg = i % 2 === 0 ? '#fff' : '#fafafa';
          return `<tr style="border-top:1px solid #e5e7eb; background:${bg};">
            <td style="padding:8px; font-weight:600; font-size:11px;">${emp.nombre}</td>
            <td style="padding:8px; color:#555; font-size:11px;">${nDias} día${nDias!==1?'s':''} · ${roles||'—'}</td>
            <td style="padding:8px; text-align:right; font-weight:700; color:#92400e; font-size:11px;">$${emp.total.toLocaleString()}</td>
            <td style="padding:6px 12px;"><div style="border-bottom:1px solid #9ca3af; margin-top:18px;"></div></td>
          </tr>`;
        }).join('');

        const contenido = document.createElement('div');
        contenido.style.cssText = 'font-family:Arial,sans-serif; color:#111; padding:24px; width:720px;';
        contenido.innerHTML = `
          <div style="text-align:center; padding-bottom:10px; border-bottom:2px solid #92400e; margin-bottom:16px;">
            <div style="font-size:15px; font-weight:700; letter-spacing:1px;">CALDOS ANGELITA</div>
            <div style="font-size:11px; color:#555; margin-top:4px;">Nómina semana <strong>${semana}</strong> · Pago en <strong>${sucNombre}</strong></div>
          </div>
          <table style="width:100%; border-collapse:collapse; border:1px solid #e5e7eb;">
            <thead>
              <tr style="background:#92400e;">
                <th style="width:30%; padding:7px 8px; text-align:left; font-size:10px; text-transform:uppercase; color:#fff; letter-spacing:0.5px;">Empleado</th>
                <th style="width:32%; padding:7px 8px; text-align:left; font-size:10px; text-transform:uppercase; color:#fff; letter-spacing:0.5px;">Resumen de la semana</th>
                <th style="width:13%; padding:7px 8px; text-align:right; font-size:10px; text-transform:uppercase; color:#fff; letter-spacing:0.5px;">Monto</th>
                <th style="width:25%; padding:7px 8px; text-align:left; font-size:10px; text-transform:uppercase; color:#fff; letter-spacing:0.5px;">Firma de recibido</th>
              </tr>
            </thead>
            <tbody>${filas}</tbody>
          </table>
          <div style="margin-top:32px; display:flex; justify-content:space-between; font-size:10px; color:#374151;">
            <div style="text-align:center;">
              <div style="border-top:1px solid #374151; width:190px; margin-bottom:5px;"></div>
              Encargado / Firma
            </div>
            <div style="text-align:center;">
              <div style="border-top:1px solid #374151; width:190px; margin-bottom:5px;"></div>
              Dueño / Vo.Bo.
            </div>
          </div>`;

        document.body.appendChild(contenido);
        const nombreArchivo = `nomina_${sucNombre.replace(/\s|\./g,'_')}_${semana}.pdf`;
        await html2pdf().set({
          margin: [10, 14],
          filename: nombreArchivo,
          html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
          jsPDF: { unit: 'mm', format: 'letter', orientation: 'landscape' }
        }).from(contenido).save();
        document.body.removeChild(contenido);
      },

      async setPagoSucursal(emp, sucursal_id) {
        emp.sucursal_pago = sucursal_id;
        await fetch('/nomina/api/pago_sucursal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ semana: this.semana, empleado_id: emp.empleado_id, sucursal_id })
        });
        await this.cargarNomina();
      },

      pedir(titulo, mensaje) {
        return new Promise(resolve => {
          this.modal = { show: true, titulo, mensaje, resolve };
        });
      },
      modalConfirmar() { this.modal.show = false; this.modal.resolve(true); },
      modalCancelar()  { this.modal.show = false; this.modal.resolve(false); },

      async eliminarSemana() {
        const ok = await this.pedir(
          'Eliminar semana',
          `¿Eliminar TODOS los registros de la semana ${this.semana}? Esta acción no se puede deshacer. (solo para pruebas)`
        );
        if (!ok) return;
        await fetch(`/nomina/api/semana/${this.semana}`, { method: 'DELETE' });
        await this.cargarNomina();
      }
    }
  }
</script>
{% endblock %}
