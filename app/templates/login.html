<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso – Restaurante</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
</head>
<body class="bg-amber-50 min-h-screen flex items-center justify-center">

  <div x-data="loginApp()" class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🍽️</div>
      <h1 class="text-2xl font-bold text-gray-800">Caldos Angelita</h1>
      <p class="text-gray-500 text-sm mt-1">Sistema de Nómina</p>
    </div>

    <form @submit.prevent="login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Sucursal</label>
        <select x-model="sucursal_id" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
          <option value="">Seleccionar sucursal...</option>
          <option value="s1">6 PTE.</option>
          <option value="s2">12 PTE.</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
        <input x-model="usuario" type="text" required autocomplete="username"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
               placeholder="tu usuario">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input x-model="password" type="password" required autocomplete="current-password"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
               placeholder="••••••••">
      </div>

      <div x-show="error" class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-3 py-2" x-text="error"></div>

      <button type="submit" :disabled="loading"
              class="w-full bg-amber-700 hover:bg-amber-800 text-white font-semibold rounded-lg px-4 py-2 transition disabled:opacity-50">
        <span x-show="!loading">Entrar</span>
        <span x-show="loading">Verificando...</span>
      </button>
    </form>
  </div>

  <script>
    const DOMINIO = '@restaurante.local';

    function loginApp() {
      return {
        usuario: '',
        password: '',
        sucursal_id: '',
        error: '',
        loading: false,

        async login() {
          this.error = '';
          if (!this.sucursal_id) { this.error = 'Selecciona una sucursal'; return; }
          this.loading = true;
          try {
            const email = this.usuario.trim().toLowerCase() + DOMINIO;
            const cred = await fbAuth.signInWithEmailAndPassword(email, this.password);
            const idToken = await cred.user.getIdToken();
            const res = await fetch('/auth/session', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ idToken, sucursal_id: this.sucursal_id })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');
            window.location.href = '/dashboard';
          } catch (e) {
            this.error = e.code === 'auth/invalid-credential'
              ? 'Usuario o contraseña incorrectos'
              : (e.message || 'Error al iniciar sesión');
          } finally {
            this.loading = false;
          }
        }
      }
    }
  </script>

</body>
</html>
